name: Update and Publish Chocolatey Package

permissions:
  contents: write
  pull-requests: write

# Serialize workflow_dispatch runs so back-to-back triggers can't interleave
# commits or collide on the `package-sources` artifact name. We do NOT cancel
# an in-progress run -- letting one finish (including environment approval) is
# safer than cancelling mid-publish.
concurrency:
  group: update-and-publish
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional: override version (else auto-detect from EXE)"
        required: false
      url:
        description: "Download URL for Sonos Controller"
        required: true
        default: "https://www.sonos.com/redir/controller_software_pc2"
      commit_push:
        description: "Commit and push updated files"
        required: true
        type: boolean
        default: true
      publish:
        description: "Pack and push to Chocolatey"
        required: true
        type: boolean
        default: false

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.export.outputs.version }}
      sha256: ${{ steps.export.outputs.sha256 }}
      # `commit_sha` is the SHA the update job committed and successfully
      # pushed to main. Empty when no push was attempted or the push failed --
      # in that case the publish job falls back to the dispatch-time ref and
      # relies on the artifact handoff for the two tracked files it cares about.
      commit_sha: ${{ steps.export.outputs.commit_sha }}
      # `push_outcome` is the result of the `Push to main` step ('success',
      # 'failure', 'cancelled', or 'skipped'). The publish job consults it to
      # avoid publishing a version whose source commit never reached main.
      push_outcome: ${{ steps.push_changes.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') { echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV }
          echo "PKG_URL=${{ github.event.inputs.url }}" >> $env:GITHUB_ENV

      - name: Download installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path downloads | Out-Null
          Invoke-WebRequest -Uri "$env:PKG_URL" -OutFile downloads/sonos-controller.exe

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash downloads/sonos-controller.exe -Algorithm SHA256).Hash.ToLower()
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Extract version from EXE (if not provided)
        shell: pwsh
        run: |
          if (-not $env:VERSION -or -not $env:VERSION.Trim()) {
            $vi = (Get-Item 'downloads/sonos-controller.exe').VersionInfo
            function Normalize-Version($s) {
              if (-not $s) { return $null }
              $m = [regex]::Match($s, '(\d+\.\d+\.\d+(?:\.\d+)?)')
              if ($m.Success) { return $m.Value } else { return $null }
            }
            $prod = Normalize-Version $vi.ProductVersion
            $file = Normalize-Version $vi.FileVersion

            # Prefer FileVersion (e.g., 16.x) over ProductVersion (e.g., 90.x)
            $ver = if ($file) { $file } elseif ($prod) { $prod } else { $null }
            if (-not $ver) { throw 'No version info found on EXE' }
            echo "VERSION=$ver" >> $env:GITHUB_ENV
          }

      - name: Update nuspec and install script
        shell: pwsh
        run: |
          $nuspec = "chocolatey/sonos-controller.nuspec"
          $ps1    = "chocolatey/ChocolateyInstall.ps1"

          # Update nuspec fields
          (Get-Content $nuspec) `
            -replace '<version>.*?</version>', "<version>$env:VERSION</version>" `
            | Set-Content $nuspec -Encoding UTF8

          # Update install script variables
          (Get-Content $ps1) `
            -replace "\$version\s*=\s*'.*?'", "`$version = '$env:VERSION'" `
            -replace "\$url\s*=\s*'.*?'", "`$url = '$env:PKG_URL'" `
            -replace "\$checksum\s*=\s*'.*?'", "`$checksum = '$env:SHA256'" `
            | Set-Content $ps1 -Encoding UTF8

      - name: Show changes
        shell: bash
        run: |
          git --no-pager diff -- chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1 || true

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1
          if git diff --cached --quiet; then
            echo "No changes to commit"; exit 0;
          fi
          git commit -m "chore: update to $VERSION (hash $SHA256)"

      - name: Push to main
        id: push_changes
        if: ${{ fromJSON(github.event.inputs.commit_push) }}
        continue-on-error: true
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
          git push origin HEAD:main

      - name: Create Pull Request (fallback or when push disabled)
        if: ${{ !fromJSON(github.event.inputs.commit_push) || steps.push_changes.outcome != 'success' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update to ${{ env.VERSION }} (hash ${{ env.SHA256 }})"
          branch: "auto/choco-update-${{ env.VERSION }}"
          title: "chore: update to ${{ env.VERSION }}"
          body: |
            Automated update:
            - Version: ${{ env.VERSION }}
            - URL: ${{ env.PKG_URL }}
            - SHA256: ${{ env.SHA256 }}
            
            This PR was created because the workflow could not push directly to main or direct push was disabled.

      - name: Export version/sha/commit for publish job
        id: export
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
          # Only expose commit_sha if the push actually succeeded -- otherwise
          # the SHA points at a commit that no remote has, and publishing from
          # it would violate the audit trail (and `actions/checkout` in the
          # publish job would fail to resolve the ref).
          if [ "${{ steps.push_changes.outcome }}" = "success" ]; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated package sources
        if: ${{ fromJSON(github.event.inputs.publish) }}
        uses: actions/upload-artifact@v4
        with:
          name: package-sources
          path: |
            chocolatey/sonos-controller.nuspec
            chocolatey/ChocolateyInstall.ps1
          if-no-files-found: error
          # 7 days gives the environment approver a realistic recovery window
          # if `choco push` hits a transient failure and the job needs to be
          # re-run without forcing `update` to re-fetch the installer (the
          # sonos.com redirect URL is mutable, so a same-day re-fetch could
          # return different bytes).
          retention-days: 7

  publish:
    # This job consumes CHOCO_API_KEY and is gated by the `chocolatey-publish`
    # environment -- a maintainer must approve the deployment from the Actions
    # UI before the job starts. The environment is created in repo Settings ->
    # Environments with `@fsch` as a required reviewer, and CHOCO_API_KEY is
    # stored as an environment-scoped secret (not a repo-level secret).
    # See SECURITY.md.
    needs: update
    # Publish runs only when:
    #   1. the dispatcher requested it (`publish: true`), AND
    #   2. EITHER the dispatcher opted out of pushing (`commit_push: false`,
    #      in which case publishing from the artifact is the explicit intent)
    #      OR the push to main actually succeeded.
    # This prevents the silent footgun where a failed push falls back to a PR
    # and the package is still published from a commit that never reached main.
    if: |
      fromJSON(github.event.inputs.publish) &&
      (!fromJSON(github.event.inputs.commit_push) || needs.update.outputs.push_outcome == 'success')
    runs-on: windows-latest
    timeout-minutes: 15
    environment: chocolatey-publish
    # This job handles CHOCO_API_KEY. It does not need write access to the
    # repository or PRs, so we narrow permissions from the workflow default
    # (contents: write, pull-requests: write) down to read-only.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pin to the exact commit the update job pushed to main. Empty when
          # `commit_push: false` -- in that case we fall back to the dispatch-
          # time ref and rely on the artifact handoff to overlay the two
          # tracked files that matter for packing.
          ref: ${{ needs.update.outputs.commit_sha }}
          persist-credentials: false

      - name: Download updated package sources
        uses: actions/download-artifact@v4
        with:
          name: package-sources
          path: chocolatey

      - name: Pack and Push to Chocolatey
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          VERSION: ${{ needs.update.outputs.version }}
          SHA256:  ${{ needs.update.outputs.sha256 }}
        run: |
          Write-Host "Publishing version $env:VERSION (sha256 $env:SHA256)"
          choco pack chocolatey/sonos-controller.nuspec --outputdirectory out
          if (-not $env:CHOCO_API_KEY) { throw "Missing CHOCO_API_KEY secret" }
          choco apikey -k $env:CHOCO_API_KEY -s https://push.chocolatey.org/
          choco push (Get-ChildItem out/*.nupkg | Select-Object -First 1).FullName --source https://push.chocolatey.org/
