name: Update and Publish Chocolatey Package

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional: override version (else auto-detect from EXE)"
        required: false
      url:
        description: "Download URL for Sonos Controller"
        required: true
        default: "https://www.sonos.com/redir/controller_software_pc2"
      commit_push:
        description: "Commit and push updated files"
        required: true
        type: boolean
        default: true
      publish:
        description: "Pack and push to Chocolatey"
        required: true
        type: boolean
        default: false

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') { echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV }
          echo "PKG_URL=${{ github.event.inputs.url }}" >> $env:GITHUB_ENV

      - name: Download installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path downloads | Out-Null
          Invoke-WebRequest -Uri "$env:PKG_URL" -OutFile downloads/sonos-controller.exe

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash downloads/sonos-controller.exe -Algorithm SHA256).Hash.ToLower()
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Extract version from EXE (if not provided)
        shell: pwsh
        run: |
          if (-not $env:VERSION -or -not $env:VERSION.Trim()) {
            $vi = (Get-Item 'downloads/sonos-controller.exe').VersionInfo
            function Normalize-Version($s) {
              if (-not $s) { return $null }
              $m = [regex]::Match($s, '(\d+\.\d+\.\d+(?:\.\d+)?)')
              if ($m.Success) { return $m.Value } else { return $null }
            }
            $prod = Normalize-Version $vi.ProductVersion
            $file = Normalize-Version $vi.FileVersion

            # Prefer FileVersion (e.g., 16.x) over ProductVersion (e.g., 90.x)
            $ver = if ($file) { $file } elseif ($prod) { $prod } else { $null }
            if (-not $ver) { throw 'No version info found on EXE' }
            echo "VERSION=$ver" >> $env:GITHUB_ENV
          }

      - name: Update nuspec and install script
        shell: pwsh
        run: |
          $nuspec = "chocolatey/sonos-controller.nuspec"
          $ps1    = "chocolatey/ChocolateyInstall.ps1"

          # Update nuspec fields
          (Get-Content $nuspec) `
            -replace '<version>.*?</version>', "<version>$env:VERSION</version>" `
            | Set-Content $nuspec -Encoding UTF8

          # Update install script variables
          (Get-Content $ps1) `
            -replace "\$version\s*=\s*'.*?'", "`$version = '$env:VERSION'" `
            -replace "\$url\s*=\s*'.*?'", "`$url = '$env:PKG_URL'" `
            -replace "\$checksum\s*=\s*'.*?'", "`$checksum = '$env:SHA256'" `
            | Set-Content $ps1 -Encoding UTF8

      - name: Show changes
        shell: bash
        run: |
          git --no-pager diff -- chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1 || true

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1
          if git diff --cached --quiet; then
            echo "No changes to commit"; exit 0;
          fi
          git commit -m "chore: update to $VERSION (hash $SHA256)"

      - name: Push to main
        id: push_changes
        if: ${{ fromJSON(github.event.inputs.commit_push) }}
        continue-on-error: true
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
          git push origin HEAD:main

      - name: Create Pull Request (fallback or when push disabled)
        if: ${{ !fromJSON(github.event.inputs.commit_push) || steps.push_changes.outcome != 'success' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update to ${{ env.VERSION }} (hash ${{ env.SHA256 }})"
          branch: "auto/choco-update-${{ env.VERSION }}"
          title: "chore: update to ${{ env.VERSION }}"
          body: |
            Automated update:
            - Version: ${{ env.VERSION }}
            - URL: ${{ env.PKG_URL }}
            - SHA256: ${{ env.SHA256 }}
            
            This PR was created because the workflow could not push directly to main or direct push was disabled.

      - name: Setup Chocolatey
        if: ${{ fromJSON(github.event.inputs.publish) }}
        uses: crazy-max/ghaction-chocolatey@v3

      - name: Pack and Push to Chocolatey
        if: ${{ fromJSON(github.event.inputs.publish) }}
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          choco pack chocolatey/sonos-controller.nuspec --outputdirectory out
          if (-not $env:CHOCO_API_KEY) { throw "Missing CHOCO_API_KEY secret" }
          choco apikey -k $env:CHOCO_API_KEY -s https://push.chocolatey.org/
          choco push (Get-ChildItem out/*.nupkg | Select-Object -First 1).FullName --source https://push.chocolatey.org/
