name: Update and Publish Chocolatey Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g., 16.0.0.401)"
        required: true
      url:
        description: "Download URL for Sonos Controller"
        required: true
        default: "https://www.sonos.com/redir/controller_software_pc2"
      commit_push:
        description: "Commit and push updated files"
        required: true
        type: boolean
        default: true
      publish:
        description: "Pack and push to Chocolatey"
        required: true
        type: boolean
        default: false

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        shell: pwsh
        run: |
          echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
          echo "PKG_URL=${{ github.event.inputs.url }}" >> $env:GITHUB_ENV

      - name: Download installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path downloads | Out-Null
          Invoke-WebRequest -Uri "$env:PKG_URL" -OutFile downloads/sonos-controller.exe

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash downloads/sonos-controller.exe -Algorithm SHA256).Hash.ToLower()
          echo "SHA256=$hash" >> $env:GITHUB_ENV

      - name: Update nuspec and install script
        shell: pwsh
        run: |
          $nuspec = "chocolatey/sonos-controller.nuspec"
          $ps1    = "chocolatey/ChocolateyInstall.ps1"

          # Update nuspec fields
          (Get-Content $nuspec) `
            -replace '<version>.*?</version>', "<version>$env:VERSION</version>" `
            -replace '<url>.*?</url>', "<url>$env:PKG_URL</url>" `
            -replace '<checksum>.*?</checksum>', "<checksum>$env:SHA256</checksum>" `
            | Set-Content $nuspec -Encoding UTF8

          # Update install script variables
          (Get-Content $ps1) `
            -replace "\$version\s*=\s*'.*?'", "`$version = '$env:VERSION'" `
            -replace "\$url\s*=\s*'.*?'", "`$url = '$env:PKG_URL'" `
            -replace "\$checksum\s*=\s*'.*?'", "`$checksum = '$env:SHA256'" `
            | Set-Content $ps1 -Encoding UTF8

      - name: Show changes
        shell: bash
        run: |
          git --no-pager diff -- chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1 || true

      - name: Commit and push
        if: ${{ fromJSON(github.event.inputs.commit_push) }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chocolatey/sonos-controller.nuspec chocolatey/ChocolateyInstall.ps1
          git commit -m "chore: update to $VERSION (hash $SHA256)"
          git push

      - name: Setup Chocolatey
        if: ${{ fromJSON(github.event.inputs.publish) }}
        uses: crazy-max/ghaction-chocolatey@v3

      - name: Pack and Push to Chocolatey
        if: ${{ fromJSON(github.event.inputs.publish) }}
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          choco pack chocolatey/sonos-controller.nuspec --outputdirectory out
          if (-not $env:CHOCO_API_KEY) { throw "Missing CHOCO_API_KEY secret" }
          choco apikey -k $env:CHOCO_API_KEY -s https://push.chocolatey.org/
          choco push (Get-ChildItem out/*.nupkg | Select-Object -First 1).FullName --source https://push.chocolatey.org/

